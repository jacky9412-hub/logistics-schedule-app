<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="460" height="140">
  <defs>
    <!-- Green gradient base -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a9d8f"/>
      <stop offset="50%" style="stop-color:#1d6b63"/>
      <stop offset="100%" style="stop-color:#145a53"/>
    </linearGradient>
    <linearGradient id="greenLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3cc0ad"/>
      <stop offset="100%" style="stop-color:#1d6b63"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#52d4a8"/>
      <stop offset="100%" style="stop-color:#2a9d8f"/>
    </linearGradient>
    <!-- Soft shadow -->
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1d6b6330"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#14504820"/>
    </filter>
  </defs>

  <!-- === Icon: Abstract flowing clipboard / route marker === -->
  <g transform="translate(20, 16)" filter="url(#glow)">
    <!-- Flowing shield / leaf shape -->
    <path d="M54,8 C72,8 86,18 90,36 C94,56 88,80 74,100
             C64,114 54,126 54,140
             C54,126 44,114 34,100
             C20,80 14,56 18,36
             C22,18 36,8 54,8 Z"
          fill="url(#greenGrad)" opacity="0.95"/>

    <!-- Inner flowing curves (route lines) -->
    <path d="M36,48 Q54,42 72,48" fill="none" stroke="#a8e6cf" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M32,64 Q54,56 76,64" fill="none" stroke="#a8e6cf" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M34,80 Q54,72 74,80" fill="none" stroke="#a8e6cf" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Checkmark -->
    <polyline points="40,94 50,106 68,86" fill="none" stroke="#e8faf0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Top accent dot -->
    <circle cx="54" cy="26" r="5" fill="#a8e6cf" opacity="0.8"/>
  </g>

  <!-- === Wordmark: CHEX (flowing italic style) === -->
  <g filter="url(#textShadow)">
    <!-- "CHEX" main text — italic for flow -->
    <text x="138" y="106" font-family="'Segoe UI', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif"
          font-size="86" font-weight="700" font-style="italic" letter-spacing="4" fill="url(#greenGrad)">
      CHEX
    </text>

    <!-- Flowing underline swoosh -->
    <path d="M140,118 Q260,132 430,112" fill="none" stroke="url(#leafGrad)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
